<!-- Sidebar Navigation + Dynamic Content -->
<h6>Manage My Account</h6>
<div class="links flex-md-column">

  <a [routerLink]="['/account/edit']"
     routerLinkActive="active"
     [routerLinkActiveOptions]="{ exact: true }"
     class="link-mav">
    My Profile
  </a>

  <a [routerLink]="['/account/payment']"
     routerLinkActive="active"
     [routerLinkActiveOptions]="{ exact: true }"
     class="link-mav">
    My Payment Options
  </a>

</div>

<h6>My Orders</h6>
<div class="links flex-md-column">

  <a [routerLink]="['/account/my-orders']"
     routerLinkActive="active"
     [routerLinkActiveOptions]="{ exact: true }"
     class="link-mav">
    My Orders
  </a>


</div>
