<div class="price-filter">
  <!-- Dual range track -->
  <div class="range-track-wrap">
    <div class="range-fill" [style.left.%]="fillLeft()" [style.width.%]="fillWidth()"></div>

    <input
      type="range"
      class="range-input range-min"
  <h4>Price</h4>
  <div class="range-slider">
    <input
      type="range"
      [min]="min()"
      [max]="max()"
      [value]="value().min"
      (input)="updateMin($event)"
    />
    <input
      type="range"
      class="range-input range-max"
      [min]="min()"
      [max]="max()"
      [value]="value().max"
      (input)="updateMax($event)"
    />
  </div>

  <!-- Labels -->
  <div class="price-labels">
  <div class="price-inputs">
    <span>${{ value().min }}</span>
    <span>${{ value().max }}</span>
  </div>
</div>
