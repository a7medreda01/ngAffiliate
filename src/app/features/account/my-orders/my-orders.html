<div class="container my-4">
  <h4 class="title">My Orders</h4>

  <div class="order-card mb-4 shadow-sm" *ngFor="let order of orders">
    <div class="order-header d-flex justify-content-between flex-wrap">
      <div>
        <small>ORDER PLACED</small><br>
        <strong>{{ order.date }}</strong>
      </div>

      <div>
        <small>TOTAL</small><br>
        <strong>$ 4555</strong>
      </div>

      <div>
        <small>STATUS</small><br>
        <span class="badge" >
          {{ order.status }}
        </span>
      </div>

      <div>
        <small>ORDER ID</small><br>
        <strong>#{{ order.id }}</strong>
      </div>
    </div>

    <div class="order-body d-flex justify-content-between align-items-center flex-wrap">
      <div class="order-items">
        <div *ngFor="let item of order.items">
          {{ item.name }} × {{ item.quantity }}
        </div>
      </div>

      <div class="order-actions text-end mt-3 mt-md-0">
        <button class="btn btn-outline-primary btn-sm me-2">
          View Details
        </button>

        <button class="btn btn-outline-secondary btn-sm" *ngIf="order.status === 'Delivered'">
          Buy Again
        </button>
      </div>
    </div>
  </div>
</div>
