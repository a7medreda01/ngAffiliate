<div class="container">
  <div class="links d-flex justify-content-between">
    <div class="d-flex gap-2">
      <a [routerLink]="isMerchant ? '/merchant/home' : '/affiliate/home'" class="homeLink">
        Home
      </a>
      <p>/ My Account</p>
    </div>
    <div class="d-flex gap-1">
      <p>Welcome!</p>
      <p class="text-danger">{{ userName }}</p>
    </div>
  </div>
</div>

<div class="container mt-4">
  <div class="row">

    <!-- Sidebar - بس للـ Affiliate -->
    @if (!isMerchant) {
      <div class="col-md-3">
        <app-sidebar></app-sidebar>
      </div>
    }

    <!-- Content -->
    <div [class]="isMerchant ? 'col-12' : 'col-md-9'">
      <div class="div-router">
        <router-outlet></router-outlet>
      </div>
    </div>

  </div>
</div>
