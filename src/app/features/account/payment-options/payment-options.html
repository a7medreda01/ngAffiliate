<div class="container my-4">
  <h4 class="mb-4">My Balance</h4>

  <!-- Current Balance -->
  <div class="card mb-4 shadow-sm p-3 text-center">
    <h5>Current Balance</h5>
    <h2 class="text-success">$ {{ balance }}</h2>
  </div>

  <!-- Deposit Money -->
  <div class="card mb-4 shadow-sm p-3">
    <h5>Add Money to Account</h5>
    <div class="row g-2 mt-2">
      <div class="col-md-4">
        <input type="number" class="form-control" placeholder="Amount" >
      </div>

      <div class="col-md-4">
        <select class="form-select">
          <option value="PayPal">PayPal</option>
          <option value="Credit Card">Credit Card</option>
        </select>
      </div>

      <div class="col-md-4">
        <button class="btn btn-primary w-100" (click)="addDeposit()">Deposit</button>
      </div>
    </div>
  </div>

  <!-- Transaction History -->
  <div class="card shadow-sm p-3">
    <h5>Transaction History</h5>
    <table class="table table-striped mt-3">
      <thead>
        <tr>
          <th>ID</th>
          <th>Date</th>
          <th>Type</th>
          <th>Method</th>
          <th>Amount</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let t of transactions">
          <td>{{ t.id }}</td>
          <td>{{ t.date }}</td>
          <td>
            <span [class]="t.type === 'Deposit' ? 'text-success' : 'text-danger'">{{ t.type }}</span>
          </td>
          <td>{{ t.method }}</td>
          <td>$ {{ t.amount }}</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
