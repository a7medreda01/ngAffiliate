<div class="container my-4">
  <h4 class="mb-4">My Balance</h4>

  <!-- Error Message -->
  <div *ngIf="errorMessage" class="alert alert-danger">
    {{ errorMessage }}
  </div>

  <!-- Current Balance -->
  <div class="card mb-4 shadow-sm p-3 text-center">
    <h5>Current Balance</h5>
    <h2 class="text-success">$ {{ balance }}</h2>
  </div>

  
  <!-- Transaction History -->
  <div class="card shadow-sm p-3">
    <h5>Transaction History</h5>

    <!-- Loading -->
    <div *ngIf="isLoading" class="text-center my-3">
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
    </div>

    <!-- Table -->
    <table *ngIf="!isLoading" class="table table-striped mt-3">
      <thead>
        <tr>
          <th>ID</th>
          <th>Date</th>
          <th>Type</th>
          <th>Method</th>
          <th>Amount</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngIf="transactions.length === 0">
          <td colspan="6" class="text-center text-muted">No transactions found.</td>
        </tr>
        <tr *ngFor="let t of transactions">
          <td>{{ t.id }}</td>
          <td>{{ t.date }}</td>
          <td>
            <span [ngClass]="{
              'text-success': t.type === 'Deposit',
              'text-primary': t.type === 'Commission'
            }">
              {{ t.type }}
            </span>
          </td>
          <td>{{ t.method }}</td>
          <td>$ {{ t.amount }}</td>
          <td>
            <span [ngClass]="{
              'badge bg-success': t.status === 'Paid',
              'badge bg-warning text-dark': t.status === 'Pending'
            }">
              {{ t.status }}
            </span>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
